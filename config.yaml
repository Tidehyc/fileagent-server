# FileAgent Server 配置文件

server:
  host: "0.0.0.0"
  port: 10086
  threads: 4
  max_connections: 1024

database:
  host: "127.0.0.1"
  port: 3306
  user: "fileagent"
  password: "fileagent123"
  database: "fileagent"
  pool:
    min_size: 4
    max_size: 20
    timeout: 5              # 秒
    idle_timeout: 300       # 秒
    heartbeat_interval: 60  # 秒

cache:
  type: "lru"  # "redis" 或 "lru"
  redis:
    host: "127.0.0.1"
    port: 6379
  lru:
    capacity: 10000

llm:
  provider: "ollama"           # "ollama" / "openai" / "anthropic" / "google" / "local"
  api_key: "sk-your-key-here"  # 云端 API Key（openai/anthropic/google 使用）
  api_base: "http://localhost:11434/api"  # Ollama 地址或自定义代理
  model: "llama3.2"            # 模型名（按 provider 不同）
  model_path: "/models/llama-2-7b.Q4_K_M.gguf"  # 本地 GGUF 路径（provider=local 时使用）
  num_threads: 4
  context_window: 2048
