# FileAgent Server — Nginx 反向代理配置
# FastCGI + Nginx 架构
#
# 使用方法:
#   sudo ln -s $(pwd)/nginx.conf /etc/nginx/sites-available/fileagent
#   sudo ln -s /etc/nginx/sites-available/fileagent /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx

upstream fileagent_backend {
    server 127.0.0.1:10086;
    # 支持多实例时添加更多节点
    # server 127.0.0.1:10087;
}

server {
    listen 80 default_server;
    server_name _;

    # 字符集
    charset utf-8;

    # 文件上传大小限制（根据需求调整）
    client_max_body_size 2G;
    client_body_buffer_size 128k;

    # ─── Web 管理界面（静态文件，优先匹配）─────────
    location = / {
        rewrite ^ /web/index.html last;
    }

    location /web/ {
        alias /home/tide/workplace/FileAgent_Server/web/;
        expires 10m;
        add_header Cache-Control "public";
    }

    # ─── FastCGI 参数 ────────────────────────────────
    # Nginx 转发动态请求到 FastCGI 后端

    location / {
        # 健康检查（返回 JSON）
        include fastcgi_params;
        fastcgi_pass fileagent_backend;
        fastcgi_param SCRIPT_FILENAME /index.php;  # FastCGI 需要，实际未使用
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
        fastcgi_buffer_size 32k;
        fastcgi_buffers 8 32k;
        fastcgi_busy_buffers_size 64k;
    }

    # ─── 静态文件（直接由 Nginx 服务）───────────────
    # uploads/ 目录下的文件通过 /uploads/ 路径直接访问
    location /uploads/ {
        alias /home/tide/workplace/FileAgent_Server/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        autoindex off;
    }

    # ─── FastDFS 内部文件下载（X-Accel-Redirect）───
    location /fastdfs-files/ {
        internal;
        alias /home/tide/fastdfs/storage/data/;
    }

    # ─── 日志 ──────────────────────────────────────
    access_log /var/log/nginx/fileagent_access.log;
    error_log  /var/log/nginx/fileagent_error.log;
}
